name: aiscr
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: aiscr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: joaogmauricio/ai-security-code-reviewer@test/aiscr-action
        with:
          api-key: ${{ secrets.GENAI_GATEWAY_KEY }}
          base-url: https://genai-sharedservice-emea.pwcinternal.com/
          opus-model: vertex_ai.anthropic.claude-opus-4-8
          sonnet-model: vertex_ai.anthropic.claude-sonnet-4-6
          haiku-model: vertex_ai.anthropic.claude-3-haiku
          fail-on: never
