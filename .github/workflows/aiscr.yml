name: aiscr
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  
concurrency:
  group: aiscr-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      - uses: joaogmauricio/ai-security-code-reviewer@main
        with:
          # Required
          api-key:    ${{ secrets.GENAI_GATEWAY_KEY }}
          
          # Gateway / model routing — empty when unset = direct Anthropic API
          base-url:   ${{ vars.AISCR_BASE_URL }}
          opus-model:   ${{ vars.AISCR_OPUS_MODEL }}
          sonnet-model: ${{ vars.AISCR_SONNET_MODEL }}
          haiku-model:  ${{ vars.AISCR_HAIKU_MODEL }}
          
          # Behavior toggles — fallback to action default when unset
          mode:                    ${{ vars.AISCR_MODE                    || 'delta' }}
          fail-on:                 ${{ vars.AISCR_FAIL_ON                 || 'never' }}
          verbose:                 ${{ vars.AISCR_VERBOSE                 || 'false' }}
          upload-artifact:         ${{ vars.AISCR_UPLOAD_ARTIFACT         || 'true'  }}
          artifact-retention-days: ${{ vars.AISCR_ARTIFACT_RETENTION_DAYS || '30'    }}
