name: aiscr
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: aiscr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: joaogmauricio/ai-security-code-reviewer@test/aiscr-action
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          fail-on: never
